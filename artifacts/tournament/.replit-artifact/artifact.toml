kind = "web"
previewPath = "/"
title = "IK3MO Tournament"
version = "1.0.0"
id = "artifacts/tournament"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23844

[services.development]
run = "pnpm --filter @workspace/tournament run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tournament", "run", "build" ]
publicDir = "artifacts/tournament/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23844"
BASE_PATH = "/"
